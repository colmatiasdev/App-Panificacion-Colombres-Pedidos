<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Pedido - Panificacion Colombres</title>
  <link rel="stylesheet" href="../../../index.css">
  <link rel="stylesheet" href="../../Footer/footer.css">
  <link rel="stylesheet" href="Nuevo-pedido.css">
</head>
<body>
  <header class="header">
    <div class="header__logo">
      <h1>Panificacion Colombres</h1>
      <span class="header__subtitle">Sistema de Pedidos</span>
    </div>
    <nav class="nav">
      <ul class="nav__menu">
        <li class="nav__item">
          <a href="../../../index.html" class="nav__link">Inicio</a>
        </li>
        <li class="nav__item">
          <a href="Nuevo-pedido.html" class="nav__link nav__link--active">Nuevo Pedido</a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <div class="page-header">
      <h1>Nuevo Pedido</h1>
    </div>

    <section class="nuevo-pedido__cliente">
      <h2 class="nuevo-pedido__titulo">Cliente</h2>
      <p class="nuevo-pedido__mensaje" id="nuevo-pedido-cliente-msg">Cargando clientes…</p>
      <div class="nuevo-pedido__cliente-filtro" id="nuevo-pedido-cliente-select-wrap">
        <label for="nuevo-pedido-cliente">Cliente</label>
        <select id="nuevo-pedido-cliente" class="nuevo-pedido__select nuevo-pedido__select--cliente" aria-required="true">
          <option value="">— Seleccione un cliente —</option>
        </select>
      </div>
      <div class="nuevo-pedido__cliente-seleccionado" id="nuevo-pedido-cliente-info" hidden>
        <span id="nuevo-pedido-cliente-info-text"></span>
        <button type="button" class="nuevo-pedido__btn-cambiar-cliente" id="nuevo-pedido-btn-cambiar-cliente">Cambiar cliente</button>
      </div>
    </section>

    <section class="nuevo-pedido__listado">
      <h2 class="nuevo-pedido__titulo">Productos</h2>
      <p class="nuevo-pedido__mensaje" id="nuevo-pedido-mensaje">Cargando productos…</p>
      <div class="nuevo-pedido__buscar">
        <label for="nuevo-pedido-buscar">Buscar producto</label>
        <div class="nuevo-pedido__buscar-row">
          <input type="text" id="nuevo-pedido-buscar" class="nuevo-pedido__input-buscar" placeholder="Nombre o categoría…" aria-label="Buscar producto" autocomplete="off">
          <button type="button" class="nuevo-pedido__btn-limpiar" id="nuevo-pedido-btn-limpiar" aria-label="Limpiar búsqueda">Limpiar búsqueda</button>
        </div>
      </div>
      <div class="nuevo-pedido__productos-wrapper" id="nuevo-pedido-productos"></div>
    </section>

    <section class="nuevo-pedido__resumen">
      <h2 class="nuevo-pedido__titulo">Resumen del pedido</h2>
      <div class="nuevo-pedido__resumen-content" id="nuevo-pedido-resumen-content">
        <p class="nuevo-pedido__resumen-vacio" id="nuevo-pedido-resumen-vacio">No hay productos en el pedido. Selecciona productos arriba.</p>
        <table class="nuevo-pedido__tabla" id="nuevo-pedido-tabla" hidden>
          <thead>
            <tr>
              <th>Producto</th>
              <th class="nuevo-pedido__th-num">Precio unit.</th>
              <th class="nuevo-pedido__th-num">Cantidad</th>
              <th class="nuevo-pedido__th-num">Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="nuevo-pedido-tabla-body"></tbody>
          <tfoot>
            <tr class="nuevo-pedido__total-row">
              <td colspan="3"><strong>Total pedido</strong></td>
              <td class="nuevo-pedido__th-num" id="nuevo-pedido-total">0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
        <div class="nuevo-pedido__guardar">
          <button type="button" class="nuevo-pedido__btn-guardar" id="nuevo-pedido-btn-guardar" disabled>Guardar pedido</button>
          <span class="nuevo-pedido__guardar-msg" id="nuevo-pedido-guardar-msg"></span>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-container" data-footer-src="../../Footer/footer.html"></div>

  <script src="../../Config/config.js"></script>
  <script src="../../Config/tables.js"></script>
  <script src="../../Config/negocio.js"></script>
  <script src="../../../main.js"></script>
  <script src="../../Footer/footer.js"></script>
  <script src="Nuevo-pedido.js"></script>
</body>
</html>
