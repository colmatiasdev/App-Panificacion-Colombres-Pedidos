<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleccionar cliente - Panificacion Colombres</title>
  <link rel="stylesheet" href="../../../index.css">
  <link rel="stylesheet" href="../../Footer/footer.css">
  <link rel="stylesheet" href="Seleccionar-cliente.css">
</head>
<body>
  <header class="header">
    <div class="header__logo">
      <h1>Panificacion Colombres</h1>
      <span class="header__subtitle">Sistema de Pedidos</span>
    </div>
    <nav class="nav">
      <ul class="nav__menu">
        <li class="nav__item">
          <a href="../../../index.html" class="nav__link">Inicio</a>
        </li>
        <li class="nav__item">
          <a href="../Nuevo-pedido/Nuevo-pedido.html" class="nav__link">Nuevo Pedido</a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <div class="page-header">
      <h1>Seleccionar cliente</h1>
    </div>

    <p class="seleccionar-cliente__desc">Elija el cliente para el pedido. Al hacer clic irá a cargar el pedido con ese cliente vinculado.</p>
    <p class="seleccionar-cliente__mensaje" id="seleccionar-cliente-msg">Cargando clientes…</p>

    <div class="seleccionar-cliente__buscar" id="seleccionar-cliente-buscar-wrap" hidden>
      <label for="seleccionar-cliente-buscar">Buscar por nombre</label>
      <input type="text" id="seleccionar-cliente-buscar" class="seleccionar-cliente__input" placeholder="Escriba para filtrar…" aria-label="Buscar cliente">
    </div>

    <ul class="seleccionar-cliente__lista" id="seleccionar-cliente-lista" aria-label="Lista de clientes"></ul>

    <p class="seleccionar-cliente__vacio" id="seleccionar-cliente-vacio" hidden>No hay clientes habilitados. Cargue clientes en el sistema.</p>
  </main>

  <div id="footer-container" data-footer-src="../../Footer/footer.html"></div>

  <script src="../../Config/config.js"></script>
  <script src="../../Config/tables.js"></script>
  <script src="../../../main.js"></script>
  <script src="../../Footer/footer.js"></script>
  <script src="Seleccionar-cliente.js"></script>
</body>
</html>
